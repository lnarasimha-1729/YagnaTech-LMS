# YagnaTech Nginx site config.
# Install:
#   sudo cp deploy/nginx-yagnatech.conf /etc/nginx/sites-available/yagnatech
#   sudo ln -s /etc/nginx/sites-available/yagnatech /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace app.yourdomain.com with your real domain.
# After this works on :80, run `sudo certbot --nginx -d app.yourdomain.com`
# which will rewrite this file for HTTPS automatically.

server {
    listen 80;
    server_name app.yourdomain.com;

    # Match Bastion's 20mb proxy limit for file uploads (ID proofs, etc.).
    client_max_body_size 25m;

    root /var/www/yagnatech;
    index index.html;

    # SPA client-side routing: serve index.html for any non-file path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API gateway (Bastion, :8000) ----
    # Handles /api/v1/{auth,course,assessment,organisation,college,payment,admin}
    # and /api/v1/_services/health.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- admin-service direct (:4000) ----
    # Frontend admin pages use VITE_ADMIN_API_URL=https://domain/admin-api.
    # The trailing slash on proxy_pass strips the /admin-api prefix, so:
    #   /admin-api/api/admin/...  -> 127.0.0.1:4000/api/admin/...
    #   /admin-api/uploads/...    -> 127.0.0.1:4000/uploads/...
    location /admin-api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
